openapi: 3.0.3
info:
  title: Bullhorn Middle Office API
  version: 1.0.0
  description: |
    The Bullhorn Middle Office API provides programmatic access to the Middle Office suite,
    managing the complete lifecycle from placement configuration through time/expense entry
    to payroll and billing operations.

    ## Middle Office Systems

    Middle Office consists of three integrated systems:

    - **Pay Bill System** (91 entities): Manages billing, invoicing, rate cards, general ledger
      integration, and revenue recognition. Core entities include BillableCharge, BillMaster,
      BillMasterTransaction, InvoiceStatement, and BillingProfile.

    - **Time and Labor System** (7 entities): Handles time entry, expense reporting, and
      approval workflows for contractor placements. Core entities include Timesheet and
      ExpenseSheet.

    - **Bullhorn Time & Expense System** (7 entities): Manages placement configuration, certifications,
      onboarding, and shift scheduling. Core entities include PlacementCertification and
      OnboardingConfiguration.

    ## Pay Bill System Overview

    The Pay Bill system transforms approved time and expense data into invoiced revenue by:
    - Creating billable charges from approved timesheets and expense reports
    - Applying rate cards, discounts, surcharges, and sales tax
    - Managing billing workflows (approval, review, hold states)
    - Generating invoices grouped by billing calendar periods
    - Integrating with general ledger systems for revenue recognition
    - Tracking unbilled revenue and revenue distribution

    ## Workflow: From Time Entry to Invoice

    ```
    1. TIME/EXPENSE ENTRY (Time and Labor System)
       └─> Timesheet/ExpenseSheet approved

    2. CHARGE CREATION (Pay Bill - BillableCharge)
       └─> BillableCharge created, status = NotReadyToBill

    3. TRANSACTION GROUPING (Pay Bill - BillMaster)
       └─> BillMaster groups by earn code + transaction date
       └─> BillMasterTransaction records rates, amounts, audit trail

    4. APPROVAL & REVIEW (Pay Bill - Workflows)
       └─> Transactions approved (status = Approved)
       └─> Review flags cleared (needsReview = false)
       └─> Charge status → ReadyToBill

    5. INVOICING (Pay Bill - InvoiceStatement)
       └─> Transactions stamped with invoiceStatementBatch
       └─> Invoice created with discounts, surcharges, taxes
       └─> Transactions become immutable
       └─> Charge status → Invoiced

    6. GL INTEGRATION (Pay Bill - Accounting)
       └─> Revenue recognized in AccountingPeriod
       └─> UnbilledRevenueDistribution (if applicable)
       └─> Export to external GL systems
    ```

    ## Entity Hierarchy

    ```
    BillableCharge (Charge-level container)
      ├─> BillMaster (Master-level grouping by earn code/date)
      │     ├─> BillMasterTransaction (Individual transaction audit trail)
      │     │     ├─> BillMasterTransactionDiscountDetail
      │     │     ├─> BillMasterTransactionSurchargeDetail
      │     │     └─> BillMasterTransactionSalesTaxDetail
      │     ├─> BillMasterDiscountRate (Applied discounts)
      │     └─> BillMasterSurchargeRate (Applied surcharges)
      │
      └─> InvoiceStatementLineItem (When invoiced)
            └─> InvoiceStatement (Final invoice to client)
    ```

    ## BillableCharge Status Flow

    The BillableCharge entity progresses through these statuses:

    1. **NotReadyToBill (1)** - Default state when transactions aren't yet approved
    2. **ReadyToBill (2)** - All transactions approved and eligible for invoicing
    3. **Processing (3)** - Bill masters syncing (temporary state)
    4. **NeedsReview (4)** - Flagged for manual review (e.g., rate issues, missing data)
    5. **Invoicing (5)** - Associated with invoice statement (not yet finalized)
    6. **Invoiced (6)** - All transactions invoiced and finalized
    7. **Unbillable (7)** - All transactions marked unbillable
    8. **ProcessingFailed (8)** - Bill master sync failed
    9. **OnHold (9)** - Charge is on hold (prevents invoicing)

    **Status Priority**: OnHold > ProcessingFailed > Processing > NeedsReview >
    Invoiced/Unbillable > ReadyToBill > NotReadyToBill

    ## Transaction Immutability & Adjustments

    **BillMasterTransaction** records become immutable once:
    - `invoiceStatement != null` (already invoiced)
    - `invoiceStatementBatch != null` (stamped for invoicing)
    - `billMasterTransactionDistributionBatch != null` (in revenue distribution)

    **Adjustment Pattern**: To modify immutable transactions, create adjustment pairs:
    1. **Reversal Transaction** - Negates original quantity and amount, links via
       `reversalOfTransaction`, increments `adjustmentSequenceNumber`
    2. **Adjustment Transaction** - Contains corrected values, further increments
       `adjustmentSequenceNumber`, system recalculates `netAmount` and `netQuantity`

    Example:
    ```
    Original: quantity=8.0, amount=400.00, adjustmentSequenceNumber=0
    Reversal: quantity=-8.0, amount=-400.00, adjustmentSequenceNumber=1
    Adjustment: quantity=9.0, amount=450.00, adjustmentSequenceNumber=2
    Net Result: netQuantity=9.0, netAmount=450.00
    ```

    ## Integration Points

    ### Time and Labor System
    - **Input**: Approved timesheets and expense reports
    - **Trigger**: BillableCharge creation from approved time/expense
    - **Workflow**: Timesheet approved → BillableCharge created → BillMaster +
      BillMasterTransaction generated

    ### Bullhorn Time & Expense (BTE) System
    - **Input**: Placement configuration, rate cards, billing profiles
    - **Usage**: Determines rates, billing calendar, discount/surcharge rules
    - **Workflow**: Placement defines billing rules → Applied during BillableCharge creation

    ### General Ledger Systems
    - **Output**: Revenue recognition, unbilled revenue, invoice data
    - **Integration**: Export via pay-export-services
    - **Workflow**: Transactions distributed → Revenue recognized → Exported to external GL

    ## Common API Patterns

    ### Create Billable Charge
    ```http
    PUT /services/BillableCharge
    {
      "description": "John Smith - Software Engineer - Period Ending 2025-01-31",
      "periodEndDate": "2025-01-31",
      "placement": {"id": 12345},
      "billMasters": [{
        "earnCode": {"id": 1},
        "transactionDate": "2025-01-27",
        "quantity": 40.0,
        "rate": 75.00,
        "amount": 3000.00
      }]
    }
    ```

    ### Mark Charge Ready for Billing
    ```http
    POST /services/BillableCharge/markAsReady
    {"billableChargeIds": [67890]}
    ```

    ### Place Charge on Hold
    ```http
    PUT /services/BillableCharge/updateHoldStatus
    {
      "billableChargeIds": [67890],
      "billableChargeHoldStatusLookupID": 1,
      "onHoldComment": "Pending rate verification with client"
    }
    ```

    ### Email Invoice to Client
    ```http
    POST /services/InvoiceStatement/email
    {
      "invoiceStatementIDs": [12345, 12346],
      "includePDFAttachment": true,
      "sendImmediately": false,
      "updateDeliveryStatus": true
    }
    ```

    ### Generate Invoice Export
    ```http
    POST /services/InvoiceStatement/generateExport
    {
      "invoiceStatementIDs": [12345, 12346],
      "exportFormat": "PDF",
      "exportTemplateID": 50,
      "includeLineItems": true
    }
    ```

    ### Credit Invoice
    ```http
    POST /services/InvoiceStatement/credit
    {
      "invoiceStatementID": 12345,
      "creditReason": "Billing error - incorrect rate used",
      "automaticallyFinalize": true,
      "generateInvoiceNumber": true,
      "creditInvoiceNumberSuffix": "CR"
    }
    ```

    ## Invoicing Workflow

    The InvoiceStatement workflow extends the Pay Bill system from billable charges to client invoices:

    ```
    1. INVOICE GENERATION
       └─> BillableCharges with status=ReadyToBill selected
       └─> InvoiceStatementBatch created
       └─> Charges grouped by client + billing profile + period
       └─> InvoiceStatement created per group

    2. LINE ITEM CREATION
       └─> BillMasterTransactions grouped by earn code/candidate/period
       └─> InvoiceStatementLineItem created for each group
       └─> Discounts, surcharges, taxes applied

    3. INVOICE FINALIZATION
       └─> Invoice reviewed and approved
       └─> isFinalized set to true
       └─> Invoice becomes immutable
       └─> Invoice number generated

    4. DELIVERY TO CLIENT
       └─> Email with PDF attachment (via /services/InvoiceStatement/email)
       └─> deliveryStatus updated
       └─> Or: Export to portal/EDI (via /services/InvoiceStatement/generateExport)

    5. PAYMENT TRACKING
       └─> InvoicePayment records created
       └─> invoiceStatementPaidStatus updated
       └─> outstandingBalance calculated

    6. GL EXPORT
       └─> Invoice data exported to external accounting systems
       └─> Revenue recognized in AccountingPeriod
    ```

    ## Authentication

    This API uses OAuth 2.0 for authentication followed by a session-based token system:

    1. Obtain an OAuth 2.0 access token through the OAuth flow
    2. Call `/login` with the access token to receive a BhRestToken
    3. Include BhRestToken in all subsequent API requests

    ## Base URL Structure

    All API requests follow this pattern:
    ```
    https://rest{swimlane}.bullhornstaffing.com/rest-services/{corpToken}/{endpoint}
    ```

    Where:
    - `{swimlane}` is your data center swimlane number (e.g., '9', '22', or empty for default)
    - `{corpToken}` is your corporation token from the login response (e.g., 'e999')

  contact:
    name: Bullhorn Middle Office Support
    url: https://bullhorn.github.io/rest-api-docs
  license:
    name: Proprietary

servers:
  - url: https://rest{swimlane}.bullhornstaffing.com/rest-services/{corpToken}
    description: Bullhorn REST API Server
    variables:
      swimlane:
        default: ''
        description: |
          Data center swimlane number (e.g., '9', '22').
          Leave empty for default. Obtained from /loginInfo endpoint.
      corpToken:
        default: 'e999'
        description: |
          Corporation token returned from the login endpoint.
          This identifies your organization's instance.

security:
  - BhRestToken: []

tags:
  - name: Services - BillableCharge
    description: |
      BillableCharge service endpoints for creating, updating, and managing billable charges
      through their workflow lifecycle.

      A BillableCharge records a chargeable fee, capturing key details like the fee amount,
      rate type, effective dates, and status. It ties charges to specific BillMasterTransactions
      and manages them through the billing workflow from creation to invoicing.

  - name: Invoice Statement Services
    description: |
      InvoiceStatement service endpoints for managing invoice generation, delivery, and lifecycle
      operations.

      InvoiceStatements consolidate BillableCharges into client-facing invoices with line items,
      discounts, surcharges, and taxes. These endpoints handle invoice finalization, email
      delivery, export to various formats, credit invoice creation, and integration with
      external accounting systems.

  - name: Invoice Statement Entity
    description: |
      Entity endpoints for querying and retrieving InvoiceStatement records.

      Use these endpoints to retrieve invoice data, search invoices, and access related
      entities like line items, payments, discounts, surcharges, and taxes.

paths:
  /services/BillableCharge:
    $ref: './paths/services/BillableCharge.yaml#/createBillableCharge'

  /services/BillableCharge/{billableChargeId}:
    $ref: './paths/services/BillableCharge.yaml#/updateBillableCharge'

  /services/BillableCharge/markAsReady:
    $ref: './paths/services/BillableCharge.yaml#/markAsReady'

  /services/BillableCharge/markUnbillable:
    $ref: './paths/services/BillableCharge.yaml#/markUnbillable'

  /services/BillableCharge/updateHoldStatus:
    $ref: './paths/services/BillableCharge.yaml#/updateHoldStatus'

  /services/BillableCharge/clearNeedsReviewAndMarkAsReady:
    $ref: './paths/services/BillableCharge.yaml#/clearNeedsReviewAndMarkAsReady'

  /services/InvoiceStatement/generateExport:
    $ref: './paths/services/InvoiceStatement.yaml#/generateExport'

  /services/InvoiceStatement/email:
    $ref: './paths/services/InvoiceStatement.yaml#/email'

  /services/InvoiceStatement/credit:
    $ref: './paths/services/InvoiceStatement.yaml#/credit'

  /services/InvoiceStatement/repostRequest:
    $ref: './paths/services/InvoiceStatement.yaml#/repostRequest'

  /entity/InvoiceStatement/{id}:
    $ref: './paths/entity/InvoiceStatement.yaml#/getInvoiceStatement'

  /query/InvoiceStatement:
    $ref: './paths/entity/InvoiceStatement.yaml#/queryInvoiceStatements'

components:
  securitySchemes:
    BhRestToken:
      type: apiKey
      in: header
      name: BhRestToken
      description: |
        Session token obtained from the login endpoint.

        Can be provided in one of three ways:
        - **HTTP Header** (recommended): `BhRestToken` or `BHRestToken`
        - **Query Parameter**: `?BhRestToken=<token>`
        - **Cookie**: Automatically set by login endpoint for browser clients

        Example:
        ```
        BhRestToken: a1b2c3d4-e5f6-g7h8-i9j0-k1l2m3n4o5p6
        ```

  parameters:
    $ref: './components/parameters/common.yaml'

  schemas:
    $ref: './components/schemas/common.yaml'

  responses:
    $ref: './components/responses/errors.yaml'
