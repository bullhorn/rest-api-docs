openapi: 3.0.3
info:
  title: Bullhorn Middle Office API
  version: 1.0.0
  description: |
    The Bullhorn Middle Office API provides programmatic access to the Middle Office suite,
    managing the complete lifecycle from placement configuration through time/expense entry
    to payroll and billing operations.

    This OpenAPI specification documents the **Pay Bill System** service endpoints for managing
    billable charges and invoices. For complete workflow documentation, entity schemas, and
    authentication details, use the navigation sidebar.

    ## Middle Office Systems

    Middle Office consists of three integrated systems:

    - **Pay Bill System** (91 entities): Manages billing, invoicing, rate cards, general ledger
      integration, and revenue recognition. Core entities include BillableCharge, BillMaster,
      BillMasterTransaction, InvoiceStatement, and BillingProfile.

    - **Time and Labor System** (7 entities): Handles time entry, expense reporting, and
      approval workflows for contractor placements. Core entities include Timesheet and
      ExpenseSheet.

    - **Bullhorn Time & Expense System** (7 entities): Manages placement configuration, certifications,
      onboarding, and shift scheduling. Core entities include PlacementCertification and
      OnboardingConfiguration.

    ## Getting Started

    1. Review the [Overview](#tag/Overview) for a quick start guide
    2. Set up [Authentication](#tag/Authentication) using OAuth 2.0 and BhRestToken
    3. Understand the [Billing Workflow](#tag/Billing-Workflow) from time entry to invoice
    4. Explore [BillableCharge Services](#tag/BillableCharge-Services) for available operations
    5. Reference [Entity Documentation](#tag/BillableCharge-Entities) for data structures

  contact:
    name: Bullhorn Middle Office Support
    url: https://bullhorn.github.io/rest-api-docs
  license:
    name: Proprietary

servers:
  - url: https://rest{swimlane}.bullhornstaffing.com/rest-services/{corpToken}
    description: Bullhorn REST API Server
    variables:
      swimlane:
        default: ''
        description: |
          Data center swimlane number (e.g., '9', '22').
          Leave empty for default. Obtained from /loginInfo endpoint.
      corpToken:
        default: 'e999'
        description: |
          Corporation token returned from the login endpoint.
          This identifies your organization's instance.

security:
  - BhRestToken: []

