openapi: 3.0.3
info:
  title: Bullhorn Middle Office API
  version: 1.0.0
  description: |
    The Bullhorn Middle Office API provides programmatic access to the Middle Office suite,
    managing the complete lifecycle from placement configuration through time/expense entry
    to payroll and billing operations.

    ## Middle Office Systems

    Middle Office consists of three integrated systems:

    - **Pay Bill System** (91 entities): Manages billing, invoicing, rate cards, general ledger
      integration, and revenue recognition. Core entities include BillableCharge, BillMaster,
      InvoiceStatement, and BillingProfile.

    - **Time and Labor System** (7 entities): Handles time entry, expense reporting, and
      approval workflows for contractor placements. Core entities include Timesheet and
      ExpenseSheet.

    - **Back to Employer System** (7 entities): Manages placement configuration, certifications,
      onboarding, and shift scheduling. Core entities include PlacementCertification and
      OnboardingConfiguration.

    ## BillableCharge Workflow

    The BillableCharge entity is central to the billing process, progressing through these statuses:

    1. **NotReadyToBill**: Initial state for new charges
    2. **ReadyToBill**: Charges validated and ready for invoicing
    3. **Processing**: Currently being processed into invoices
    4. **NeedsReview**: Requires manual review due to validation issues
    5. **Invoiced**: Successfully invoiced to client
    6. **Unbillable**: Marked as non-billable
    7. **ProcessingFailed**: Failed during invoice generation
    8. **OnHold**: Temporarily paused from billing

    ## Authentication

    This API uses OAuth 2.0 for authentication followed by a session-based token system:

    1. Obtain an OAuth 2.0 access token through the OAuth flow
    2. Call `/login` with the access token to receive a BhRestToken
    3. Include BhRestToken in all subsequent API requests

    ## Base URL Structure

    All API requests follow this pattern:
    ```
    https://rest{swimlane}.bullhornstaffing.com/rest-services/{corpToken}/{endpoint}
    ```

    Where:
    - `{swimlane}` is your data center swimlane number (e.g., '9', '22', or empty for default)
    - `{corpToken}` is your corporation token from the login response (e.g., 'e999')

  contact:
    name: Bullhorn Middle Office Support
    url: https://bullhorn.github.io/rest-api-docs
  license:
    name: Proprietary

servers:
  - url: https://rest{swimlane}.bullhornstaffing.com/rest-services/{corpToken}
    description: Bullhorn REST API Server
    variables:
      swimlane:
        default: ''
        description: |
          Data center swimlane number (e.g., '9', '22').
          Leave empty for default. Obtained from /loginInfo endpoint.
      corpToken:
        default: 'e999'
        description: |
          Corporation token returned from the login endpoint.
          This identifies your organization's instance.

security:
  - BhRestToken: []

tags:
  - name: Services - BillableCharge
    description: |
      BillableCharge service endpoints for creating, updating, and managing billable charges
      through their workflow lifecycle.

      A BillableCharge records a chargeable fee, capturing key details like the fee amount,
      rate type, effective dates, and status. It ties charges to specific BillMasterTransactions
      and manages them through the billing workflow from creation to invoicing.

paths:
  /services/BillableCharge:
    $ref: './paths/services/BillableCharge.yaml#/createBillableCharge'

  /services/BillableCharge/{billableChargeId}:
    $ref: './paths/services/BillableCharge.yaml#/updateBillableCharge'

  /services/BillableCharge/markAsReady:
    $ref: './paths/services/BillableCharge.yaml#/markAsReady'

  /services/BillableCharge/markUnbillable:
    $ref: './paths/services/BillableCharge.yaml#/markUnbillable'

  /services/BillableCharge/updateHoldStatus:
    $ref: './paths/services/BillableCharge.yaml#/updateHoldStatus'

  /services/BillableCharge/clearNeedsReviewAndMarkAsReady:
    $ref: './paths/services/BillableCharge.yaml#/clearNeedsReviewAndMarkAsReady'

components:
  securitySchemes:
    BhRestToken:
      type: apiKey
      in: header
      name: BhRestToken
      description: |
        Session token obtained from the login endpoint.

        Can be provided in one of three ways:
        - **HTTP Header** (recommended): `BhRestToken` or `BHRestToken`
        - **Query Parameter**: `?BhRestToken=<token>`
        - **Cookie**: Automatically set by login endpoint for browser clients

        Example:
        ```
        BhRestToken: a1b2c3d4-e5f6-g7h8-i9j0-k1l2m3n4o5p6
        ```

  parameters:
    $ref: './components/parameters/common.yaml'

  schemas:
    $ref: './components/schemas/common.yaml'

  responses:
    $ref: './components/responses/errors.yaml'
