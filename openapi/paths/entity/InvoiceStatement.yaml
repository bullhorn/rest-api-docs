getInvoiceStatement:
  get:
    tags:
      - Invoice Statement Entity
    summary: Get an InvoiceStatement by ID
    description: |
      Retrieves a single InvoiceStatement entity by its ID.

      **Entity Access**: READ
      **Entitlements**: View Invoice Statement

    operationId: getInvoiceStatement
    parameters:
      - name: id
        in: path
        required: true
        description: InvoiceStatement ID
        schema:
          type: integer
          format: int32
        example: 12345
      - name: fields
        in: query
        description: |
          Comma-separated list of fields to return. Use "*" for all fields.
        schema:
          type: string
        example: "id,invoiceStatementNumber,total,isFinalized,clientCorporation"
      - name: BhRestToken
        in: query
        description: Session token (can also be provided via header)
        schema:
          type: string
    responses:
      '200':
        description: InvoiceStatement retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/InvoiceStatementEntity.yaml#/InvoiceStatementEntity'
            examples:
              basic:
                summary: Basic invoice data
                value:
                  invoiceStatementID: 12345
                  invoiceStatementNumber: "INV-2024-001234"
                  invoiceStatementDate: "2024-01-15T00:00:00Z"
                  isFinalized: true
                  subtotal: 15000.00
                  discountAmount: 750.00
                  surchargeAmount: 250.00
                  taxAmount: 987.50
                  total: 15487.50
                  amountPaid: 10000.00
                  outstandingBalance: 5487.50
      '401':
        description: Unauthorized - invalid or missing authentication
      '403':
        description: Forbidden - user lacks View Invoice Statement entitlement
      '404':
        description: Not found - invoice ID does not exist
      '500':
        description: Internal server error

queryInvoiceStatements:
  get:
    tags:
      - Invoice Statement Entity
    summary: Query InvoiceStatements
    description: |
      Searches for InvoiceStatement entities using a query string.

      **Entity Access**: READ
      **Entitlements**: View Invoice Statement

    operationId: queryInvoiceStatements
    parameters:
      - name: where
        in: query
        required: true
        description: |
          Lucene-style query string. Examples:
          - `clientCorporation.id:100`
          - `isFinalized:true AND invoiceStatementDate:[2024-01-01 TO 2024-01-31]`
          - `invoiceStatementNumber:INV-2024-*`
        schema:
          type: string
        example: "clientCorporation.id:100 AND isFinalized:true"
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
        example: "id,invoiceStatementNumber,total,clientCorporation"
      - name: count
        in: query
        description: Maximum number of results to return (default 20, max 500)
        schema:
          type: integer
          default: 20
          maximum: 500
        example: 50
      - name: start
        in: query
        description: Offset for pagination (default 0)
        schema:
          type: integer
          default: 0
        example: 0
      - name: orderBy
        in: query
        description: |
          Sort order. Prefix with "-" for descending.
          Examples: "invoiceStatementDate", "-total"
        schema:
          type: string
        example: "-invoiceStatementDate"
      - name: BhRestToken
        in: query
        description: Session token
        schema:
          type: string
    responses:
      '200':
        description: Query successful
        content:
          application/json:
            schema:
              type: object
              properties:
                total:
                  type: integer
                  description: Total count of matching records
                start:
                  type: integer
                  description: Offset used for this result set
                count:
                  type: integer
                  description: Number of records returned
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/InvoiceStatementEntity.yaml#/InvoiceStatementEntity'
            examples:
              queryResult:
                summary: Query result
                value:
                  total: 145
                  start: 0
                  count: 2
                  data:
                    - invoiceStatementID: 12345
                      invoiceStatementNumber: "INV-2024-001234"
                      total: 15487.50
                      isFinalized: true
                    - invoiceStatementID: 12346
                      invoiceStatementNumber: "INV-2024-001235"
                      total: 8750.00
                      isFinalized: false
      '400':
        description: Bad request - invalid query syntax
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
      '500':
        description: Internal server error
