InvoiceStatementBatchEntity:
  type: object
  description: |
    Represents a batch invoice generation run. Invoice batches allow generating multiple
    invoices at once based on selection criteria (e.g., all ready-to-bill charges for
    specific clients or billing profiles).

    **CRUD Access**: READ
    **Entitlements**: View Invoice Statement

    **Batch Processing Workflow**:
    1. User or scheduled job creates a batch with selection criteria
    2. System identifies eligible BillableCharges (status = ReadyToBill)
    3. Invoices are generated based on grouping rules (by client, billing profile, period)
    4. Batch tracks all invoices created and any errors encountered
    5. Batch completes with success/failure status

    **Common Batch Scenarios**:
    - **Scheduled Monthly Invoicing**: Automated batch runs on 1st of month for all clients
    - **Client-Specific Batch**: Generate invoices for one client across all placements
    - **Billing Profile Batch**: Generate invoices for specific billing arrangement
    - **Ad-hoc Batch**: Manual invoice generation for selected charges

  properties:
    invoiceStatementBatchID:
      type: integer
      format: int32
      description: Primary key. Unique identifier for the batch.
      readOnly: true
      example: 55555

    batchNumber:
      type: string
      maxLength: 50
      description: |
        Human-readable batch identifier for tracking and reporting.
        Often includes date/time component.
      example: "BATCH-2024-01-001"

    batchDate:
      type: string
      format: date-time
      description: |
        Date/time the batch was created and processing started.
      example: "2024-01-15T00:00:00Z"

    status:
      type: string
      enum: [Pending, Processing, Completed, Failed, PartiallyCompleted, Cancelled]
      description: |
        Current status of the batch.
        - **Pending**: Batch created but processing not yet started
        - **Processing**: Batch is currently generating invoices
        - **Completed**: All invoices generated successfully
        - **Failed**: Batch processing failed
        - **PartiallyCompleted**: Some invoices generated, some failed
        - **Cancelled**: Batch cancelled before completion
      example: "Completed"

    # Selection Criteria
    clientCorporation:
      type: object
      nullable: true
      description: |
        If specified, batch only generates invoices for this client.
        Leave null to process all eligible clients.
      properties:
        id:
          type: integer
        name:
          type: string

    billingProfile:
      type: object
      nullable: true
      description: |
        If specified, batch only generates invoices for this billing profile.
      properties:
        id:
          type: integer
        title:
          type: string

    periodStartDate:
      type: string
      format: date-time
      nullable: true
      description: |
        Start date for the billing period. Only charges with periodEndDate >= this date
        will be included.
      example: "2024-01-01T00:00:00Z"

    periodEndDate:
      type: string
      format: date-time
      nullable: true
      description: |
        End date for the billing period. Only charges with periodEndDate <= this date
        will be included.
      example: "2024-01-31T23:59:59Z"

    # Batch Results
    totalInvoicesGenerated:
      type: integer
      format: int32
      description: |
        Count of invoices successfully generated by this batch.
      example: 45

    totalInvoicesFailed:
      type: integer
      format: int32
      description: |
        Count of invoices that failed to generate due to errors.
      example: 2

    totalInvoiceAmount:
      type: number
      format: double
      nullable: true
      description: |
        Sum of all invoice totals generated in this batch.
      example: 125000.00

    # Execution Details
    startDateTime:
      type: string
      format: date-time
      nullable: true
      description: |
        Date/time batch processing started.
      example: "2024-01-15T00:05:00Z"

    endDateTime:
      type: string
      format: date-time
      nullable: true
      description: |
        Date/time batch processing completed (success or failure).
      example: "2024-01-15T00:47:23Z"

    executionDurationSeconds:
      type: integer
      format: int32
      nullable: true
      description: |
        Total execution time in seconds.
        Calculated as: endDateTime - startDateTime
      example: 2543

    # Error Tracking
    errorLog:
      type: string
      maxLength: 2147483647
      nullable: true
      description: |
        Detailed error log if batch failed or partially completed.
        Contains error messages for failed invoice generation attempts.
      example: |
        ERROR: Failed to generate invoice for ClientCorp ID 123 - Missing billing address
        ERROR: Failed to generate invoice for ClientCorp ID 456 - No billable charges found

    # Batch Configuration
    generateInvoiceNumbers:
      type: boolean
      description: |
        Whether to generate invoice numbers during batch processing.
        If false, invoices are created but not numbered (draft mode).

        Default: true
      example: true

    finalizeInvoices:
      type: boolean
      description: |
        Whether to automatically finalize invoices after generation.
        If false, invoices remain in draft status for review.

        Default: false
      example: false

    # Related Records
    invoiceStatements:
      type: object
      description: |
        Collection of InvoiceStatements generated by this batch.

        **Usage**: `GET /entity/InvoiceStatementBatch/{id}/invoiceStatements`
      properties:
        total:
          type: integer
        data:
          type: array
          items:
            $ref: './InvoiceStatementEntity.yaml#/InvoiceStatementEntity'

    # Scheduling
    isScheduledBatch:
      type: boolean
      description: |
        Indicates if this batch was triggered by a scheduled job (true) or manually (false).

        Default: false
      example: true

    scheduledJobName:
      type: string
      maxLength: 100
      nullable: true
      description: |
        Name of the scheduled job that triggered this batch (if applicable).
      example: "Monthly Invoice Generation - All Clients"

    # Audit Fields
    dateAdded:
      type: string
      format: date-time
      readOnly: true
      description: Timestamp when the batch was created
      example: "2024-01-15T00:00:00Z"

    dateLastModified:
      type: string
      format: date-time
      readOnly: true
      description: Timestamp of last modification
      example: "2024-01-15T00:47:23Z"

    createdByUser:
      type: object
      nullable: true
      description: User who created the batch (if manually triggered)
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string

  required:
    - invoiceStatementBatchID
    - batchNumber
    - batchDate
    - status
