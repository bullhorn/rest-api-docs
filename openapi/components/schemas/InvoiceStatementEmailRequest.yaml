InvoiceStatementEmailRequest:
  type: object
  description: |
    Request payload for emailing invoice statements to clients via the
    `/services/InvoiceStatement/email` endpoint.

    This service sends invoice emails with PDF attachments to configured recipients.

  properties:
    invoiceStatementIDs:
      type: array
      items:
        type: integer
        format: int32
      description: |
        Array of InvoiceStatement IDs to email.
        All invoices must be finalized (isFinalized = true) to be emailed.
      minItems: 1
      example: [12345, 12346, 12347]

    emailTemplateID:
      type: integer
      format: int32
      nullable: true
      description: |
        ID of the email template to use for the message body and subject.
        If not specified, uses the default template from the billing profile.
      example: 100

    overrideToAddress:
      type: string
      maxLength: 500
      nullable: true
      description: |
        Optional override email address. If specified, all invoices are sent to this
        address instead of the invoice's configured recipients.

        **Use case**: Testing email delivery before sending to clients.

        Format: Single email or semicolon-separated list.
      example: "test@bullhorn.com"

    overrideCcAddress:
      type: string
      maxLength: 500
      nullable: true
      description: |
        Optional override CC address. If specified, overrides the invoice's CC recipients.
      example: "manager@bullhorn.com"

    overrideBccAddress:
      type: string
      maxLength: 500
      nullable: true
      description: |
        Optional override BCC address. If specified, overrides the invoice's BCC recipients.
      example: "archive@bullhorn.com"

    includePDFAttachment:
      type: boolean
      description: |
        Whether to attach the PDF invoice to the email.

        Default: true
      example: true

    pdfTemplateID:
      type: integer
      format: int32
      nullable: true
      description: |
        ID of the PDF template to use for generating the invoice attachment.
        If not specified, uses the default template from the billing profile.
      example: 50

    customSubject:
      type: string
      maxLength: 255
      nullable: true
      description: |
        Optional custom email subject line. If specified, overrides the template's subject.
        May include variables: {invoiceNumber}, {clientName}, {invoiceDate}, {total}
      example: "Invoice {invoiceNumber} from Bullhorn - Due {dueDate}"

    customMessage:
      type: string
      maxLength: 2147483647
      nullable: true
      description: |
        Optional custom message to prepend to the email body.
        HTML formatting is supported.
      example: |
        <p>Dear Valued Client,</p>
        <p>Please find attached your invoice for services rendered.</p>

    sendImmediately:
      type: boolean
      description: |
        Whether to send emails immediately (true) or queue for batch processing (false).

        - **true**: Emails sent synchronously, slower response time
        - **false**: Emails queued for background processing, faster response

        Default: false
      example: false

    updateDeliveryStatus:
      type: boolean
      description: |
        Whether to update the invoice's deliveryStatus field after successful email.

        Default: true
      example: true

  required:
    - invoiceStatementIDs

  example:
    invoiceStatementIDs: [12345, 12346]
    emailTemplateID: 100
    includePDFAttachment: true
    pdfTemplateID: 50
    sendImmediately: false
    updateDeliveryStatus: true
