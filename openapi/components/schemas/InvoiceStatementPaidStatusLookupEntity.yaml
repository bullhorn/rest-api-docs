InvoiceStatementPaidStatusLookupEntity:
  type: object
  description: |
    Lookup table for invoice payment status values. Tracks the payment state of an invoice.

    **CRUD Access**: READ only
    **Entitlements**: Public lookup data

    **Common Paid Status Values**:
    - **Unpaid**: No payment has been received (outstandingBalance = total)
    - **Partially Paid**: Some payment received but balance remains
    - **Paid**: Full payment received (outstandingBalance = 0)
    - **Overpaid**: Payment received exceeds invoice total (rare)
    - **Written Off**: Balance written off as uncollectible
    - **In Dispute**: Payment disputed by client
    - **Pending**: Payment in process but not yet cleared

    The paid status is automatically calculated based on InvoicePayment records and the
    invoice's outstandingBalance field.

  properties:
    id:
      type: integer
      format: int32
      description: Primary key. Unique identifier for the paid status.
      readOnly: true
      example: 3

    label:
      type: string
      maxLength: 100
      description: |
        Display label for the paid status.
      example: "Paid"

    description:
      type: string
      maxLength: 255
      nullable: true
      description: |
        Detailed description of what this paid status represents.
      example: "Invoice has been paid in full. Outstanding balance is zero."

    isActive:
      type: boolean
      description: |
        Indicates whether this paid status is currently active and available for use.
        Inactive statuses may be legacy values no longer in use.

        Default: true
      example: true

    sortOrder:
      type: integer
      format: int32
      nullable: true
      description: |
        Sort order for displaying paid status values in dropdowns and reports.
        Lower numbers appear first.
      example: 3

    # Payment Completion Flag
    indicatesFullPayment:
      type: boolean
      description: |
        Indicates whether this status represents full payment (true for "Paid", false for others).
        Used for reporting and filtering fully paid invoices.

        Default: false
      example: true

  required:
    - id
    - label
